services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: passpass
      POSTGRES_DB: my_pim_oms
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
  maildev:
    image: maildev/maildev:2.2.1
    ports:
      - 1025:1025
      - 1080:1080
volumes:
  pgdata:
